<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анкета разработчика | Soft Vision</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: radial-gradient(circle at 10% 30%, #f5f0e7, #e3d9cd);
            font-family: 'Inter', 'Segoe UI', 'Manrope', system-ui, -apple-system, sans-serif;
            padding: 2rem 1.5rem;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .form-container {
            max-width: 980px;
            width: 100%;
            background: #fefdf9;
            border-radius: 2.5rem;
            box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(226, 196, 148, 0.2);
            overflow: hidden;
            transition: transform 0.2s ease;
        }
        
        .form-header {
            background: linear-gradient(115deg, #2c2b28 0%, #1e1d1b 100%);
            padding: 2rem 2.8rem;
            color: #faf6eb;
            border-bottom: 1px solid #ffdd99;
        }
        
        .form-header h1 {
            font-weight: 650;
            font-size: 2rem;
            letter-spacing: -0.3px;
            margin-bottom: 0.4rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .form-header h1:before {
            content: "⚡";
            font-size: 1.9rem;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2));
        }
        
        .form-header p {
            font-size: 0.9rem;
            opacity: 0.8;
            font-weight: 400;
            letter-spacing: 0.2px;
        }
        
        .form-body {
            padding: 2rem 2.5rem;
            background: #ffffff;
        }
        
        .field-group {
            margin-bottom: 1.9rem;
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            gap: 0.9rem;
        }
        
        .field-group label {
            width: 170px;
            font-weight: 600;
            color: #2d3e50;
            font-size: 0.9rem;
            padding-top: 0.7rem;
            flex-shrink: 0;
            letter-spacing: -0.2px;
        }
        
        .field-group .input-wrapper {
            flex: 1;
            min-width: 230px;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 0.8rem 1.1rem;
            border: 1.8px solid #ece3d8;
            border-radius: 1.2rem;
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.2s;
            outline: none;
            background-color: #ffffff;
            color: #1e2a36;
        }
        
        input:focus, select:focus, textarea:focus {
            border-color: #c9772e;
            box-shadow: 0 0 0 4px rgba(201, 119, 46, 0.15);
            background-color: #fffcf7;
        }
        
        .radio-group {
            display: flex;
            gap: 1.6rem;
            align-items: center;
            flex-wrap: wrap;
            background: #fefaf4;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            border: 1.5px solid #f1e6da;
        }
        
        .radio-group label {
            width: auto;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            padding-top: 0;
            color: #2e3f4b;
        }
        
        .radio-group input {
            width: 18px;
            height: 18px;
            accent-color: #c9772e;
        }
        
        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 0.85rem;
            background: #fefaf4;
            padding: 0.7rem 1.3rem;
            border-radius: 2rem;
            border: 1.5px solid #f1e6da;
        }
        
        .checkbox-wrapper input {
            width: 20px;
            height: 20px;
            accent-color: #c9772e;
        }
        
        .checkbox-wrapper label {
            font-weight: 500;
            cursor: pointer;
            color: #2e3f4b;
        }
        
        select[multiple] {
            min-height: 150px;
            background: #fefcf9;
            border-radius: 1.2rem;
            padding: 0.5rem;
        }
        
        select[multiple] option {
            padding: 0.6rem 1rem;
            border-radius: 0.8rem;
            margin-bottom: 3px;
            transition: background 0.1s;
        }
        
        select[multiple] option:checked {
            background: #d9a066 linear-gradient(0deg, #d17e3b 0%, #c4692a 100%);
            color: white;
            font-weight: 500;
        }
        
        textarea {
            resize: vertical;
            min-height: 110px;
            line-height: 1.5;
            background: #fefcf9;
        }
        
        .action-buttons {
            margin-top: 2.3rem;
            text-align: right;
            border-top: 2px dashed #f0e4d4;
            padding-top: 1.8rem;
        }
        
        .save-btn {
            background: linear-gradient(105deg, #2c3e2f, #1f2e22);
            border: none;
            padding: 0.85rem 2.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 3rem;
            color: #fef6e8;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
            letter-spacing: 0.3px;
        }
        
        .save-btn:hover {
            transform: translateY(-3px);
            background: linear-gradient(105deg, #3e5a41, #2b4230);
            box-shadow: 0 18px 28px -14px rgba(0, 0, 0, 0.35);
        }
        
        .alert {
            padding: 0.9rem 1.3rem;
            border-radius: 1.2rem;
            margin-bottom: 1.5rem;
            font-weight: 500;
            backdrop-filter: blur(2px);
        }
        
        .alert-success {
            background: #e6f4e8;
            color: #2c6e2f;
            border-left: 6px solid #4caf50;
        }
        
        .alert-error {
            background: #ffe9e9;
            color: #b13b3b;
            border-left: 6px solid #e65c5c;
        }
        
        ::placeholder {
            color: #bcae9a;
            font-weight: 400;
        }
        
        @media (max-width: 720px) {
            .form-body {
                padding: 1.5rem;
            }
            .field-group {
                flex-direction: column;
            }
            .field-group label {
                width: 100%;
                padding-bottom: 0.2rem;
            }
            .radio-group {
                justify-content: flex-start;
            }
            .form-header {
                padding: 1.4rem 1.6rem;
            }
            .form-header h1 {
                font-size: 1.6rem;
            }
        }
        
        /* легкие иконки в инпутах */
        .input-wrapper input[type="text"],
        .input-wrapper input[type="tel"],
        .input-wrapper input[type="email"],
        .input-wrapper input[type="date"] {
            background-repeat: no-repeat;
            background-position: left 1rem center;
            background-size: 1.1rem;
            padding-left: 2.5rem;
        }
        
        #fullname {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="%23c9772e" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>');
        }
        #phone {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="%23c9772e" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" /></svg>');
        }
        #email {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="%23c9772e" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>');
        }
        #birthdate {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="%23c9772e" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>');
        }
        .input-wrapper input[type="text"],
        .input-wrapper input[type="tel"],
        .input-wrapper input[type="email"],
        .input-wrapper input[type="date"] {
            background-position: left 1rem center;
            background-size: 1.1rem;
            padding-left: 2.8rem;
        }
        
        /* custom style for select multiple hint */
        .hint-text {
            font-size: 0.7rem;
            color: #a18f78;
            margin-top: 0.4rem;
            padding-left: 0.3rem;
            letter-spacing: 0.2px;
        }
    </style>
</head>
<body>
<div class="form-container">
    <div class="form-header">
        <h1>📄 Регистрационная анкета</h1>
        <p>Заполните данные о себе — все поля проверяются на сервере</p>
    </div>
    
    <div class="form-body">
        <form method="POST" action="index.php">
            <!-- ФИО -->
            <div class="field-group">
                <label for="fullname">👤 ФИО *</label>
                <div class="input-wrapper">
                    <input type="text" id="fullname" name="fullname" placeholder="Иванов Иван Иванович" required>
                </div>
            </div>
            
            <!-- Телефон -->
            <div class="field-group">
                <label for="phone">📞 Телефон</label>
                <div class="input-wrapper">
                    <input type="tel" id="phone" name="phone" placeholder="+7 (900) 123-45-67">
                </div>
            </div>
            
            <!-- Email -->
            <div class="field-group">
                <label for="email">✉️ E-mail *</label>
                <div class="input-wrapper">
                    <input type="email" id="email" name="email" placeholder="dev@example.com" required>
                </div>
            </div>
            
            <!-- Дата рождения -->
            <div class="field-group">
                <label for="birthdate">🎂 Дата рождения</label>
                <div class="input-wrapper">
                    <input type="date" id="birthdate" name="birthdate">
                </div>
            </div>
            
            <!-- Пол -->
            <div class="field-group">
                <label>⚥ Пол</label>
                <div class="input-wrapper radio-group">
                    <label><input type="radio" name="gender" value="male"> Мужской</label>
                    <label><input type="radio" name="gender" value="female"> Женский</label>
                    <label><input type="radio" name="gender" value="other"> Другой</label>
                    <label><input type="radio" name="gender" value="unspecified" checked> Не указан</label>
                </div>
            </div>
            
            <!-- Языки программирования -->
            <div class="field-group">
                <label>💻 Любимые языки *</label>
                <div class="input-wrapper">
                    <select name="fav_langs[]" id="fav_langs" multiple size="6" required>
                        <option value="Pascal">Pascal</option>
                        <option value="C">C</option>
                        <option value="C++">C++</option>
                        <option value="JavaScript">JavaScript</option>
                        <option value="PHP">PHP</option>
                        <option value="Python">Python</option>
                        <option value="Java">Java</option>
                        <option value="Haskell">Haskell</option>
                        <option value="Clojure">Clojure</option>
                        <option value="Prolog">Prolog</option>
                        <option value="Scala">Scala</option>
                        <option value="Go">Go</option>
                    </select>
                    <div class="hint-text">
                        ⌘ Удерживайте Ctrl (Cmd) для выбора нескольких языков
                    </div>
                </div>
            </div>
            
            <!-- Биография -->
            <div class="field-group">
                <label for="bio">📝 Биография</label>
                <div class="input-wrapper">
                    <textarea id="bio" name="bio" rows="4" placeholder="Расскажите о своем опыте в разработке, увлечениях, проектах..."></textarea>
                </div>
            </div>
            
            <!-- Контракт -->
            <div class="field-group">
                <label>📑 Согласие</label>
                <div class="input-wrapper checkbox-wrapper">
                    <input type="checkbox" id="contractCheck" name="contract_agreed" required>
                    <label for="contractCheck">Я ознакомлен(а) с условиями пользовательского соглашения *</label>
                </div>
            </div>
            
            <!-- Кнопка сохранения -->
            <div class="action-buttons">
                <button type="submit" class="save-btn">💾 Сохранить</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
